general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({action = "enable"})'
    inhibit_sleep = 3
}

listener {
    timeout = 60
    on-timeout = brightnessctl -d amdgpu_bl2 -s set 5%
    on-resume = brightnessctl -d amdgpu_bl2 -r restore
}

listener {
    timeout = 180
    on-timeout = loginctl lock-session && hyprctl dispatch 'hl.dsp.dpms({action = "disable"})'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({action = "enable"})'
}

listener {
    timeout = 300
    on-timeout = $HOME/.config/bin/suspend-unless-claude
}
