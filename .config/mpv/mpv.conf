# Hardware decoding (NVDEC for NVIDIA)
hwdec=nvdec

# Use yt-dlp for streaming URLs
script-opts=ytdl_hook-ytdl_path=yt-dlp

# Best available quality for streaming
ytdl-format=bestvideo+bestaudio/best

# OSD styling
osd-font-size=32
osd-duration=2000

# Keep the window open after playback ends
keep-open=yes

# Save playback position on quit
save-position-on-quit=yes
